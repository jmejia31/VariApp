<div class="login-page">
  <form class="card login-card" [formGroup]="form" (ngSubmit)="submit()">
    <div class="header">
      <mat-icon class="logo">inventory_2</mat-icon>
      <h1>InventoryApp</h1>
      <p>Inicia sesión para administrar tu inventario</p>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Usuario</mat-label>
      <input matInput formControlName="nombreUsuario" autocomplete="username">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Contraseña</mat-label>
      <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="password" autocomplete="current-password">
      <button mat-icon-button matSuffix type="button" (click)="hidePassword.set(!hidePassword())">
        <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
    </mat-form-field>

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || loading()">
      @if (loading()) {
        <mat-spinner diameter="20"></mat-spinner>
      } @else {
        Entrar
      }
    </button>
  </form>
</div>
