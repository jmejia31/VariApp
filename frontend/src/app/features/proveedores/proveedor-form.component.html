<div class="proveedor-form-container">
  <div class="header">
    <h1>{{ isEdit() ? 'Editar Proveedor' : 'Nuevo Proveedor' }}</h1>
    <a routerLink="/proveedores" mat-button>
      <mat-icon>arrow_back</mat-icon>
      Volver
    </a>
  </div>

  <div class="form-container" *ngIf="!saving() else loadingTemplate">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline">
        <mat-label>Nombre *</mat-label>
        <input matInput formControlName="nombre" required>
        <mat-error>El nombre es obligatorio</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Teléfono</mat-label>
        <input matInput formControlName="telefono">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Documento</mat-label>
        <input matInput formControlName="documento">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Correo</mat-label>
        <input matInput formControlName="correo" type="email">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Dirección</mat-label>
        <input matInput formControlName="direccion">
      </mat-form-field>

      <div class="error-message" *ngIf="errorMessage()">
        {{ errorMessage() }}
      </div>

      <div class="actions">
        <button type="submit" mat-raised-button color="primary" [disabled]="form.invalid">
          {{ isEdit() ? 'Actualizar' : 'Crear' }}
        </button>
        <a routerLink="/proveedores" mat-button>Cancelar</a>
      </div>
    </form>
  </div>

  <ng-template #loadingTemplate>
    <div class="loading-container">
      <mat-spinner></mat-spinner>
      <p>Guardando...</p>
    </div>
  </ng-template>
</div>
