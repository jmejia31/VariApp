name: VariApp CI

# Certificación controlada de Fases 6 y 7. Nunca despliega a Render/Vercel
# ni ejecuta migraciones contra Aiven; la aceptación usa MySQL temporal.
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/checkpoints/phase-6
      - .github/checkpoints/phase-7

permissions:
  contents: write
  pull-requests: read
  actions: read

concurrency:
  group: variapp-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend migration, build and tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/mejoras-variapp'
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: backend/**/*.csproj

      - name: Restore
        run: dotnet restore InventoryApp.sln

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef --version 8.0.2

      - name: Generate additive Phase 6 migration
        shell: bash
        run: |
          set -euo pipefail
          if find src/Infrastructure/Migrations -maxdepth 1 -name '*_Fase6SeguridadFacturacionPerfil.cs' | grep -q .; then
            echo 'La migración de Fase 6 ya existe; se verificará sin regenerarla.'
          else
            dotnet ef migrations add Fase6SeguridadFacturacionPerfil \
              --project src/Infrastructure/InventoryApp.Infrastructure.csproj \
              --startup-project src/API/InventoryApp.API.csproj \
              --context AppDbContext \
              --output-dir Migrations
          fi

      - name: Inspect forward migration safety
        id: migration_safety
        shell: bash
        run: |
          set -euo pipefail
          migration_file="$(find src/Infrastructure/Migrations -maxdepth 1 -name '*_Fase6SeguridadFacturacionPerfil.cs' ! -name '*.Designer.cs' | head -n 1)"
          test -n "$migration_file"
          echo "Revisando únicamente Up() en $migration_file"
          awk '
            /protected override void Up\(MigrationBuilder migrationBuilder\)/ { capture=1 }
            /protected override void Down\(MigrationBuilder migrationBuilder\)/ { capture=0 }
            capture { print }
          ' "$migration_file" > phase6-migration-up.txt
          grep -En 'migrationBuilder\.(DropColumn|DropTable|DeleteData|DropIndex|DropForeignKey|RenameColumn|RenameTable|AlterColumn)' phase6-migration-up.txt > phase6-migration-risk.txt || true
          if test -s phase6-migration-risk.txt; then
            cat phase6-migration-risk.txt
            echo 'Up() contiene operaciones no aditivas y fue bloqueado.' >&2
            exit 1
          fi
          echo 'Up() contiene únicamente operaciones aditivas permitidas.' > phase6-migration-risk.txt

      - name: Verify model and migration alignment
        run: |
          dotnet ef migrations has-pending-model-changes \
            --project src/Infrastructure/InventoryApp.Infrastructure.csproj \
            --startup-project src/API/InventoryApp.API.csproj \
            --context AppDbContext

      - name: Generate reviewable forward SQL
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../docs/migraciones
          dotnet ef migrations script \
            20260720101639_Fases18SesionConfigPermisosCalculos \
            20260722142118_Fase6SeguridadFacturacionPerfil \
            --project src/Infrastructure/InventoryApp.Infrastructure.csproj \
            --startup-project src/API/InventoryApp.API.csproj \
            --context AppDbContext \
            --output ../docs/migraciones/004_fase6_seguridad_facturacion_perfil.sql

          sql_file='../docs/migraciones/004_fase6_seguridad_facturacion_perfil.sql'
          test -s "$sql_file"
          if grep -Ein '(^|[[:space:];])(DROP|TRUNCATE)[[:space:]]|DELETE[[:space:]]+FROM' "$sql_file"; then
            echo 'El SQL forward contiene una instrucción destructiva y fue bloqueado.' >&2
            exit 1
          fi

      - name: Upload generated migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase6-generated-migration
          path: |
            backend/src/Infrastructure/Migrations/*_Fase6SeguridadFacturacionPerfil.cs
            backend/src/Infrastructure/Migrations/*_Fase6SeguridadFacturacionPerfil.Designer.cs
            backend/src/Infrastructure/Migrations/AppDbContextModelSnapshot.cs
            backend/phase6-migration-up.txt
            backend/phase6-migration-risk.txt
            docs/migraciones/004_fase6_seguridad_facturacion_perfil.sql
          if-no-files-found: warn
          retention-days: 7

      - name: Build backend
        run: dotnet build InventoryApp.sln --configuration Release --no-restore

      - name: Run backend tests
        run: dotnet test InventoryApp.sln --configuration Release --no-build --logger "trx;LogFileName=tests.trx"

      - name: Commit generated migration and SQL to working branch
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/mejoras-variapp'
        shell: bash
        run: |
          set -euo pipefail
          if git status --porcelain -- src/Infrastructure/Migrations ../docs/migraciones | grep -q .; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add src/Infrastructure/Migrations ../docs/migraciones/004_fase6_seguridad_facturacion_perfil.sql
            git commit -m 'Add reviewed phase 6 migration artifacts'
            git push origin HEAD:agent/mejoras-variapp
          else
            echo 'No hay artefactos de migración nuevos para confirmar.'
          fi

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/**/TestResults/*.trx
          if-no-files-found: ignore
          retention-days: 7

  frontend:
    name: Frontend production build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/mejoras-variapp'
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production with compact diagnostics
        shell: bash
        run: |
          set +e
          npm run build:prod 2>&1 | tee phase6-frontend-build.log
          status=${PIPESTATUS[0]}
          {
            echo '=== Errores TypeScript/Angular y presupuestos ==='
            grep -E -i -A 5 -B 3 '(error|TS[0-9]{4}|budget|maximum exceeded|failed|✘)' phase6-frontend-build.log | tail -n 220 || true
            echo '=== Últimas líneas del build ==='
            tail -n 100 phase6-frontend-build.log
          } > phase6-frontend-summary.log
          cat phase6-frontend-summary.log
          exit "$status"

      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase6-frontend-diagnostics
          path: |
            frontend/phase6-frontend-build.log
            frontend/phase6-frontend-summary.log
          if-no-files-found: warn
          retention-days: 7

  acceptance:
    name: Phase 7 isolated MySQL and browser acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/mejoras-variapp'

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: inventoryapp_e2e
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    env:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: '5005'
      ConnectionStrings__DefaultConnection: 'Server=127.0.0.1;Port=3306;Database=inventoryapp_e2e;User=root;Password=root;SslMode=None;AllowPublicKeyRetrieval=True;'
      Database__ServerVersion: '8.4.0'
      Database__ApplyMigrationsOnStartup: 'true'
      Jwt__Secret: 'Phase7-E2E-Only-Secret-With-More-Than-32-Characters-2026'
      Jwt__Issuer: 'InventoryApp.API'
      Jwt__Audience: 'InventoryApp.Frontend'
      Jwt__ExpiraMinutos: '120'
      SeedAdmin__Username: 'e2e_admin'
      SeedAdmin__Password: 'E2E.Admin#2026!'
      Cors__AllowedOrigins__0: 'http://127.0.0.1:4200'
      Cors__AllowedOrigins__1: 'http://localhost:4200'
      AppSettings__BackendPublicUrl: 'https://preview.variapp.invalid'
      AppSettings__LogoPublicUrl: 'https://varistorehn.vercel.app/assets/varistorehn-logo.png'
      AppSettings__EnlacePublicoFacturaHorasValidez: '1'
      AppSettings__EnlacePublicoFacturaMaximoAccesos: '5'
      Cloudinary__CloudName: 'phase7-not-used'
      Cloudinary__ApiKey: 'phase7-not-used'
      Cloudinary__ApiSecret: 'phase7-not-used'
      Smtp__Host: 'phase7-not-used'
      Smtp__Port: '587'
      Smtp__UsuarioSmtp: 'phase7-not-used@example.invalid'
      Smtp__PasswordSmtp: 'phase7-not-used'
      Smtp__UsarSsl: 'true'
      Smtp__CorreoRemitente: 'phase7-not-used@example.invalid'
      Smtp__NombreRemitente: 'VariApp Phase 7'
      PHASE7_API_URL: 'http://127.0.0.1:5005'
      PHASE7_ADMIN_USERNAME: 'e2e_admin'
      PHASE7_ADMIN_PASSWORD: 'E2E.Admin#2026!'
      PLAYWRIGHT_TEST_BASE_URL: 'http://127.0.0.1:4200'

    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: backend/**/*.csproj

      - name: Restore backend
        working-directory: backend
        run: dotnet restore InventoryApp.sln

      - name: Build backend Release
        working-directory: backend
        run: dotnet build InventoryApp.sln --configuration Release --no-restore

      - name: Start API with disposable MySQL
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          nohup dotnet run \
            --project src/API/InventoryApp.API.csproj \
            --configuration Release \
            --no-build \
            --no-launch-profile \
            > phase7-api.log 2>&1 &
          echo $! > phase7-api.pid

      - name: Wait for API and migrations
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:5005/health > /dev/null; then
              echo 'API lista y migraciones aplicadas en MySQL temporal.'
              exit 0
            fi
            sleep 2
          done
          echo 'La API no respondió dentro del tiempo esperado.' >&2
          cat phase7-api.log >&2 || true
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright for the checkpoint
        working-directory: frontend
        run: |
          npm install --no-save --package-lock=false @playwright/test@latest
          npx playwright install --with-deps chromium

      - name: Start Angular development server
        working-directory: frontend
        shell: bash
        run: |
          set -euo pipefail
          nohup npm start -- --host 127.0.0.1 --port 4200 > phase7-frontend.log 2>&1 &
          echo $! > phase7-frontend.pid

      - name: Wait for Angular
        working-directory: frontend
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:4200/login > /dev/null; then
              echo 'Angular listo para pruebas de navegador.'
              exit 0
            fi
            sleep 2
          done
          echo 'Angular no respondió dentro del tiempo esperado.' >&2
          cat phase7-frontend.log >&2 || true
          exit 1

      - name: Run Phase 7 Playwright acceptance
        working-directory: frontend
        run: npx playwright test --config=playwright.config.ts

      - name: Upload Phase 7 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase7-e2e-evidence
          path: |
            backend/phase7-api.log
            frontend/phase7-frontend.log
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: warn
          retention-days: 14
