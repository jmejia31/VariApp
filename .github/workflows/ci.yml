name: VariApp CI

# Durante el desarrollo activo de la rama agent/mejoras-variapp, la validación
# se ejecuta manualmente para evitar correos repetitivos por cada commit
# intermedio. Antes de fusionar a main se restaurará la ejecución automática.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: variapp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: backend/**/*.csproj

      - name: Restore
        run: dotnet restore InventoryApp.sln

      - name: Build
        run: dotnet build InventoryApp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test InventoryApp.sln --configuration Release --no-build --logger "trx;LogFileName=tests.trx"

  frontend:
    name: Frontend production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build:prod
